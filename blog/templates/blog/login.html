{% extends 'blog/base.html' %}
{% block title %}Login - Django Blog{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
        <div class="card shadow-sm">
            <div class="card-body">
                <h2 class="card-title mb-4">Login to Your Account</h2>
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label for="id_username" class="form-label">Username</label>
                        <input type="text" name="username" autofocus required class="form-control" id="id_username">
                    </div>
                    <div class="mb-3">
                        <label for="id_password" class="form-label">Password</label>
                        <input type="password" name="password" required class="form-control" id="id_password">
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Login</button>
                </form>
                <div class="mt-4 text-center">
                    Don't have an account? <a href="{% url 'signup' %}">Signup</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
